project:
  type: book
  output-dir: final_output
  pre-render:
   - node utils/render_mermaid_blocks.mjs
  resources:
   - _generated/mermaid/*.png
   - _generated/mermaid/*.pdf

book:
  title: "From Survey Data to Behavioral ABMs: Evaluating the Limits of LLM Agents in Preventive Behavior Modeling"
  chapters:

    # Chapter 1 - Introduction & Research Motivation
   - index.qmd

    # Chapter 2 - Literature Review
   - 02-literature-review.qmd

    # Chapter 3 - Modelling the Decision Function
   - 03-modelling-decision-function.qmd

    # Chapter 4 - LLM Micro-Validation
   - 04-llm-micro-validation.qmd

    # Chapter 5 - Agent-Based Model
   - 05-agent-based-model.qmd

    # Chapter 6 - Discussion & Conclusion
   - 06-discussion-conclusion.qmd

    # Bibliography
   - 07-bibliography.qmd

  appendices:
   - appendix-dataset-details.qmd
   - appendix-missing-data.qmd
   - appendix-modelling-results.qmd
   # - appendix-decision-architecture.qmd
   - appendix-glm-ice-derivation.qmd
   - appendix-offmanifold-conditional-percentile.qmd
   - appendix-anchoring-results.qmd
   - appendix-example-prompts.qmd
   - appendix-llm-micro-validation.qmd
   - appendix-abm-equations.qmd
   - appendix-abm-sensitivity.qmd
   - appendix-code.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    mermaid:
      theme: neutral
      flowchart:
        curve: linear
    include-in-header:
      text: |
        <script type="module">
        import elkLayouts from 'https://cdn.jsdelivr.net/npm/@mermaid-js/layout-elk@0/dist/mermaid-layout-elk.esm.min.mjs';
        window.addEventListener("DOMContentLoaded", () => {
          if (window.mermaid?.registerLayoutLoaders) {
            window.mermaid.registerLayoutLoaders(elkLayouts);
          }
        });
        </script>
  pdf:
    pdf-engine: xelatex
    documentclass: scrreprt
    fontsize: 12pt
    geometry: "margin=2.5cm"
    toc: true
    linestretch: 1.4
    template-partials:
      - before-body.tex
    include-in-header:
      text: |
        \usepackage{fvextra}
        \usepackage{needspace}
        \usepackage[nottoc]{tocbibind}
        \usepackage{pdflscape}
        \DefineVerbatimEnvironment{Highlighting}{Verbatim}{commandchars=\\\{\},breaklines,breaknonspaceingroup=true,breakanywhere=true}
        \RecustomVerbatimEnvironment{Verbatim}{Verbatim}{breaklines,breaknonspaceingroup=true,breakanywhere=true}
        \setkeys{Gin}{height=0.72\textheight,keepaspectratio}
  docx:
    toc: true
    number-sections: true

link-citations: true
bibliography: References.bib
reference-section-title: Bibliography
