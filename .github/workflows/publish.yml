name: Publish

on:
  release:
    types: [published]

env:
  FORCE_COLOR: 1

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/beam-abm/
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv & select Python
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Build package
        run: make build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
